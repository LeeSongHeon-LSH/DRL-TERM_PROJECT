# 학습 PC (3090 24 GB) — π trainer + FRP server + dashboard.
# 추론 PC 들 (NAT 뒤) 이 FRP TCP tunnel 로 mu/PRM 서버 노출.
#
# === 사용 ===
#   cp .env.example .env
#   FRPS_TOKEN=<random-32+chars> FRPS_DASHBOARD_PW=<pw> docker compose up -d --build
#
# === 컴포넌트 흐름 ===
#   [추론 PC: 5070] frpc ──outbound TCP──► [학습 PC :7000 frps]
#                                              │
#                                              ▼
#                            frps 가 localhost:18001 (mu), localhost:18002 (PRM) 노출
#                            여러 추론 PC frpc 는 load balancer group 으로 round-robin
#                                              │
#                            trainer 가 http://frps:18001/18002 로 호출
#                                              │
#                                              ▼
#                                       (frps → frpc → 추론 PC mu/PRM)
#
# === 추론 PC 추가 ===
#   추론 PC 에서 docker-compose.inference.yml 띄우면 자동으로 frpc 가 frps 에 등록 →
#   별도 cluster discovery 스크립트 불필요. frps web dashboard (학습PC:7500) 에서 실시간 확인.
#
# === VRAM 예측 (24 GB GPU, 1.5B Full FT, μ/PRM remote) ===
#   π 1.5B base (bf16)              ~3.1 GB
#   gradients (bf16)                ~3.1 GB
#   8-bit Adam states               ~3.1 GB
#   activations (grad-ckpt, group=8) ~2–3 GB
#   vLLM colocate (gpu_mem=0.20)    ~4.8 GB
#   합계                              ~17 GB / 마진 ~7 GB ✅

services:
  # ---------------------------- FRP Server (TCP tunnel hub) ----------------------------
  # 추론 PC 들의 frpc 가 7000 으로 outbound 접속 → 학습 PC 에 mu/PRM 가상 endpoint 노출.
  # 학습 PC 공인 IP 의 router 가 TCP 7000 (control) + 18001~18099 (proxy) 포트포워딩 필요.
  frps:
    image: fatedier/frps:v0.61.0
    container_name: pav-frps
    restart: unless-stopped
    ports:
      - "7000:7000/tcp"           # frpc control connection (공인 IP 노출 필수)
      - "7500:7500/tcp"           # web dashboard (학습 PC 내부망/VPN 만 노출 권장)
      - "18001:18001/tcp"         # mu cluster (frps→trainer 직접 라우팅용, 모니터링)
      - "18002:18002/tcp"         # prm cluster
    volumes:
      - ./frp/frps.toml:/etc/frp/frps.toml:ro
    environment:
      FRPS_TOKEN: ${FRPS_TOKEN:?FRPS_TOKEN required — generate random 32+ chars and pass inline}
      FRPS_DASHBOARD_PW: ${FRPS_DASHBOARD_PW:-changeme}
    command: ["-c", "/etc/frp/frps.toml"]

  # ---------------------------- π Trainer ----------------------------
  # frps service name 으로 18001/18002 접근 (docker compose 의 default bridge DNS).
  trainer:
    build: .
    image: pav-rl:latest
    container_name: pav-trainer
    depends_on: [frps]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      HF_HOME: /cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      # frps 컨테이너의 18001/18002 → load balancer group 의 mu/PRM replica 로 라우팅
      PRM_ENDPOINT: http://frps:18002
      MU_ENDPOINT: http://frps:18001
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
    command: >
      python scripts/03_grpo_train.py
      --rl-config configs/rl_q3.yaml
      --prm-config configs/prm.yaml
      --policy-config configs/policy.yaml
    shm_size: "8g"

  # ---------------------------- Streamlit Dashboard (port 8501) ----------------------------
  # 학습 metrics 실시간 시각화. 학습과 독립 — trainer 죽어도 dashboard 살아있음.
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: pav-dashboard:latest
    container_name: pav-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./scripts:/app/scripts:ro
      - ./outputs:/app/outputs:ro
