# 학습 PC (3090 24 GB) — π trainer + dashboard + frpc.
# FRP 서버는 FRP/docker-compose.yml 에서 별도 관리.
#
# === 사용 ===
#   1. FRP/docker-compose.yml 로 FRP 서버 먼저 시작
#   2. docker compose up -d --build
#
# === 컴포넌트 흐름 ===
#   [추론 PC: 5070] frpc ──outbound TCP──► [학습 PC :7000 frps]
#                                              │
#                                              ▼
#                            frps 가 localhost:18001 (mu), localhost:18002 (PRM) 노출
#                            여러 추론 PC frpc 는 load balancer group 으로 round-robin
#                                              │
#                            trainer 가 http://frps:18001/18002 로 호출
#                                              │
#                                              ▼
#                                       (frps → frpc → 추론 PC mu/PRM)
#
# === 추론 PC 추가 ===
#   추론 PC 에서 docker-compose.inference.yml 띄우면 자동으로 frpc 가 frps 에 등록 →
#   별도 cluster discovery 스크립트 불필요. frps web dashboard (학습PC:7500) 에서 실시간 확인.
#
# === VRAM 예측 (24 GB GPU, 1.5B Full FT, μ/PRM remote) ===
#   π 1.5B base (bf16)              ~3.1 GB
#   gradients (bf16)                ~3.1 GB
#   8-bit Adam states               ~3.1 GB
#   activations (grad-ckpt, group=8) ~2–3 GB
#   vLLM colocate (gpu_mem=0.20)    ~4.8 GB
#   합계                              ~17 GB / 마진 ~7 GB ✅

services:
  # ---------------------------- π Trainer ----------------------------
  # frps service name 으로 18001/18002 접근 (docker compose 의 default bridge DNS).
  # FRP 서버는 FRP/docker-compose.yml 에서 별도 관리.
  trainer:
    build: .
    image: pav-rl:latest
    container_name: pav-trainer
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      HF_HOME: /cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      # frps 컨테이너의 18001/18002 → load balancer group 의 mu/PRM replica 로 라우팅
      PRM_ENDPOINT: ${PRM_ENDPOINT:-http://frps:18002}
      MU_ENDPOINT: ${MU_ENDPOINT:-http://frps:18001}
      MU_REPLICAS: ${MU_REPLICAS:-1}
      FRPS_DASHBOARD_URL: ${FRPS_DASHBOARD_URL:-http://frps:7500}
      FRPS_DASHBOARD_USER: ${FRPS_DASHBOARD_USER:-admin}
      FRPS_DASHBOARD_PASSWORD: ${FRPS_DASHBOARD_PASSWORD:-changeme}
      # RL config 선택 — 기본 C3, C2 실행 시 RL_CONFIG=configs/rl_c2_scalar.yaml 로 오버라이드
      RL_CONFIG: ${RL_CONFIG:-configs/rl_q3.yaml}
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
    command: >
      python scripts/03_grpo_train.py
      --rl-config ${RL_CONFIG:-configs/rl_q3.yaml}
      --prm-config configs/prm.yaml
      --policy-config configs/policy.yaml
    shm_size: "8g"
    networks:
      - pav-shared-network

  # ---------------------------- FRP Client (frpc) ----------------------------
  # 학습 PC에서도 frpc를 띄워 dashboard 등을 외부에 노출.
  frpc:
    image: fatedier/frpc:v0.61.0
    container_name: pav-frpc
    restart: unless-stopped
    volumes:
      - ./frp/frpc.toml:/etc/frp/frpc.toml:ro
    environment:
      FRPS_ADDR: ${FRPS_ADDR:?FRPS_ADDR required — 학습 PC의 공인 IP 또는 DDNS}
      FRPS_TOKEN: ${FRPS_TOKEN:?FRPS_TOKEN required}
      NODE_NAME: ${NODE_NAME:-pav-trainer-pc}
    command: ["-c", "/etc/frp/frpc.toml"]
    networks:
      - pav-shared-network

  # ---------------------------- Streamlit Dashboard (port 8501) ----------------------------
  # 학습 metrics 실시간 시각화. 학습과 독립 — trainer 죽어도 dashboard 살아있음.
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: pav-dashboard:latest
    container_name: pav-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./scripts:/app/scripts:ro
      - ./outputs:/app/outputs:ro
    networks:
      - pav-shared-network

# 공유 네트워크 — PAV, PRM, step-wise-PRM 이 모두 연결
networks:
  pav-shared-network:
    name: pav-shared-network
    driver: bridge
