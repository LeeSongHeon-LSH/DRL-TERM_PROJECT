# 4к°ң service + profilesлЎң л¶„мӮ° л°°нҸ¬ / лӢЁмқј нҳёмҠӨнҠё н…ҢмҠӨнҠё л‘ҳ лӢӨ м§Җмӣҗ.
#
# === мӮ¬мҡ© ===
# н•ң лІҲ л№Ңл“ң:
#   docker compose build
#
# л¶„мӮ° мӢң (к°Ғ PCм—җм„ң мһҗкё° profileл§Ң):
#   лёҢлЎңм»Ө PC:    docker compose --profile broker  up -d
#   PRM мӣҢм»Ө PC:  docker compose --profile prm     up -d
#   Ој  мӣҢм»Ө PC:  docker compose --profile mu      up -d
#   ліёмІҙ:         docker compose --profile trainer up -d
#
# лӢЁмқј нҳёмҠӨнҠё лӘЁл“  кІғ н•ңкәјлІҲм—җ:
#   docker compose --profile all up -d
#
# === нҷҳкІҪ ===
# .env (лҳҗлҠ” export) лЎң лӢӨмқҢмқ„ м •мқҳ к¶ҢмһҘ:
#   AMQP_URL=amqp://guest:guest@<broker-host>:5672/
#   HF_HOME_HOST=/path/on/host/.hf_cache    # нҳёмҠӨнҠёмқҳ HF мәҗмӢң кІҪлЎң (лӘЁлҚё мҳҒмҶҚнҷ”)
#   HF_TOKEN=...                             # publicмқҙлқј м„ нғқ, rate limit нҡҢн”јмҡ©
#   WANDB_API_KEY=...                        # trainer м „мҡ©

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

x-common-env: &common-env
  AMQP_URL: ${AMQP_URL:-amqp://guest:guest@rabbitmq:5672/}
  HF_HOME: /cache/huggingface
  HF_TOKEN: ${HF_TOKEN:-}
  # hf_transfer лҜём„Өм№ҳ мӢң Dockerfileмқҳ HF_HUB_ENABLE_HF_TRANSFER=1мқ„ override
  HF_HUB_ENABLE_HF_TRANSFER: "0"

x-volumes: &common-volumes
  - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
  # мҪ”л“ң hot-reload вҖ” мқҙлҜём§Җ мһ¬л№Ңл“ң м—Ҷмқҙ src/scripts мҲҳм • мҰүмӢң л°ҳмҳҒ (к°ңл°ң/л””лІ„к№… мҡ©)
  - ./src:/app/src:ro
  - ./scripts:/app/scripts:ro
  - ./configs:/app/configs:ro

services:
  # ---------------------------- в‘  RabbitMQ broker ----------------------------
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pav-rabbitmq
    restart: unless-stopped
    profiles: ["broker", "all"]
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbit_data:/var/lib/rabbitmq

  # ---------------------------- в‘Ў PRM мӣҢм»Ө (RTX 5070кёү) ----------------------------
  prm-worker:
    build: .
    image: pav-rl:latest
    container_name: pav-prm-worker
    restart: unless-stopped
    profiles: ["prm", "all"]
    <<: *gpu
    environment:
      <<: *common-env
    volumes: *common-volumes
    command: >
      python scripts/serve_prm.py
      --config configs/prm.yaml
      --amqp-url ${AMQP_URL:-amqp://guest:guest@rabbitmq:5672/}
      --queue prm.requests
      --prefetch 1
    # лӢЁмқј нҳёмҠӨнҠё н…ҢмҠӨнҠё мӢң broker лҢҖкё°
    depends_on:
      - rabbitmq

  # ---------------------------- в‘ў Ој мӣҢм»Ө (16GB+ GPU) ----------------------------
  mu-worker:
    build: .
    image: pav-rl:latest
    container_name: pav-mu-worker
    restart: unless-stopped
    profiles: ["mu", "all"]
    <<: *gpu
    environment:
      <<: *common-env
    volumes: *common-volumes
    command: >
      python scripts/serve_mu.py
      --config configs/policy.yaml
      --amqp-url ${AMQP_URL:-amqp://guest:guest@rabbitmq:5672/}
      --queue mu.requests
      --prefetch 1
    depends_on:
      - rabbitmq

  # ---------------------------- в‘Ј н•ҷмҠө ліёмІҙ (3090) ----------------------------
  trainer:
    build: .
    image: pav-rl:latest
    container_name: pav-trainer
    profiles: ["trainer", "all"]
    <<: *gpu
    environment:
      <<: *common-env
      WANDB_API_KEY: ${WANDB_API_KEY:-}
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro       # config н•«мҠӨмҷ‘ к°ҖлҠҘ
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
    command: >
      python scripts/03_grpo_train.py
      --rl-config configs/rl_q3.yaml
      --prm-config configs/prm.yaml
      --policy-config configs/policy.yaml
    depends_on:
      - rabbitmq
    # IPC: vLLM лӮҙл¶Җ multiprocessing мң„н•ң shared memory м¶©л¶„нһҲ (default 64MлҠ” л¶ҖмЎұ)
    shm_size: "8g"

volumes:
  rabbit_data:
