# 4к°ң service + profilesлЎң Ray cluster кё°л°ҳ л¶„мӮ° л°°нҸ¬ / лӢЁмқј нҳёмҠӨнҠё н…ҢмҠӨнҠё л‘ҳ лӢӨ м§Җмӣҗ.
#
# === мӮ¬мҡ© ===
# н•ң лІҲ л№Ңл“ң:
#   docker compose build
#
# л¶„мӮ° мӢң (к°Ғ PCм—җм„ң мһҗкё° profileл§Ң):
#   ліёмІҙ/Head PC: docker compose --profile head    up -d   # Ray head
#   PRM мӣҢм»Ө PC:  docker compose --profile prm     up -d   # 5070 Г—N (RAY_ADDRESSлЎң head к°ҖлҰ¬нӮҙ)
#   Ој  мӣҢм»Ө PC:  docker compose --profile mu      up -d   # 16GB+ GPU
#   ліёмІҙ:        docker compose --profile trainer up -d   # GRPOTrainer (Ray Train)
#
# лӢЁмқј нҳёмҠӨнҠё лӘЁл“  кІғ:
#   docker compose --profile all up -d
#
# === нҷҳкІҪ ===
# .env (лҳҗлҠ” export) лЎң:
#   RAY_ADDRESS=<head-host>:6379    # л¶„мӮ° мӢң workerк°Җ headм—җ joinн•  мЈјмҶҢ
#   HF_HOME_HOST=/path/to/cache     # нҳёмҠӨнҠё HF мәҗмӢң кІҪлЎң
#   HF_TOKEN=...                    # мҳөм…ҳ
#   WANDB_API_KEY=...               # trainer м „мҡ©

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

x-common-env: &common-env
  RAY_ADDRESS: ${RAY_ADDRESS:-ray-head:6379}
  RAY_NAMESPACE: pav-rl
  HF_HOME: /cache/huggingface
  HF_TOKEN: ${HF_TOKEN:-}
  HF_HUB_ENABLE_HF_TRANSFER: "0"

x-volumes: &common-volumes
  - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
  # мҪ”л“ң hot-reload вҖ” мқҙлҜём§Җ мһ¬л№Ңл“ң м—Ҷмқҙ src/scripts мҲҳм • мҰүмӢң л°ҳмҳҒ
  - ./src:/app/src:ro
  - ./scripts:/app/scripts:ro
  - ./configs:/app/configs:ro

services:
  # ---------------------------- в‘  Ray Head ----------------------------
  # ліёмІҙ PC лҳҗлҠ” лі„лҸ„ hostм—җм„ң 1к°ң мӢӨн–ү. Ray clusterмқҳ GCS + scheduler.
  ray-head:
    build: .
    image: pav-rl:latest
    container_name: pav-ray-head
    restart: unless-stopped
    profiles: ["head", "all"]
    <<: *gpu
    environment:
      <<: *common-env
    volumes: *common-volumes
    ports:
      - "6379:6379"      # GCS
      - "8265:8265"      # Dashboard
      - "10001:10001"    # Ray Client
    command: ["ray", "start", "--head", "--port=6379", "--dashboard-host=0.0.0.0", "--num-cpus=2", "--num-gpus=0", "--block"]
    # headлҠ” н•ҷмҠө/м¶”лЎ  м•Ҳ н•Ё (num-gpus=0). GPU мһҗмӣҗмқҖ prm/mu/trainerм—җ л§Ўк№Җ.
    shm_size: "4g"           # Ray plasma object storeмҡ©

  # ---------------------------- в‘Ў PRM Ray Worker ----------------------------
  # 5070 PC Г— NлҢҖ. Ray Headм—җ join + serve_prm_ray.pyлЎң named actor л“ұлЎқ.
  prm-worker:
    build: .
    image: pav-rl:latest
    container_name: pav-prm-worker
    restart: unless-stopped
    profiles: ["prm", "all"]
    <<: *gpu
    environment:
      <<: *common-env
    volumes: *common-volumes
    command: bash -lc "ray start --address=${RAY_ADDRESS:-ray-head:6379} && python scripts/serve_prm_ray.py --config configs/prm.yaml --address ${RAY_ADDRESS:-ray-head:6379} --num-replicas 1"
    depends_on:
      - ray-head
    shm_size: "4g"           # Ray plasma store

  # ---------------------------- в‘ў Ој Ray Worker ----------------------------
  mu-worker:
    build: .
    image: pav-rl:latest
    container_name: pav-mu-worker
    restart: unless-stopped
    profiles: ["mu", "all"]
    <<: *gpu
    environment:
      <<: *common-env
    volumes: *common-volumes
    command: bash -lc "ray start --address=${RAY_ADDRESS:-ray-head:6379} && python scripts/serve_mu_ray.py --config configs/policy.yaml --address ${RAY_ADDRESS:-ray-head:6379}"
    depends_on:
      - ray-head
    shm_size: "8g"           # vLLM + Ray plasma storeмҡ© shared memory

  # ---------------------------- в‘Ј Trainer ----------------------------
  # ліёмІҙ н•ҷмҠө. Ray Train (TorchTrainer)лЎң wrap вҶ’ multi-GPU нҷ•мһҘ к°ҖлҠҘ.
  trainer:
    build: .
    image: pav-rl:latest
    container_name: pav-trainer
    profiles: ["trainer", "all"]
    <<: *gpu
    environment:
      <<: *common-env
      WANDB_API_KEY: ${WANDB_API_KEY:-}
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
    command: bash -lc "ray start --address=${RAY_ADDRESS:-ray-head:6379} && python scripts/03_grpo_train.py --rl-config configs/rl_q3.yaml --prm-config configs/prm.yaml --policy-config configs/policy.yaml --num-workers 1"
    depends_on:
      - ray-head
    shm_size: "8g"           # vLLM лӮҙл¶Җ multiprocessing мң„н•ң shared memory
