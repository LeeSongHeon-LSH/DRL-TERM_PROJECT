# 학습 PC (3090 24 GB) — π trainer 1개 컨테이너.
# PRM / μ는 추론 PC에서 별도 docker-compose.inference.yml로 띄움.
#
# === 사용 ===
#   cp .env.example .env
#   # .env에서 PRM_ENDPOINT / MU_ENDPOINT를 추론 PC IP로 설정
#   docker compose build
#   docker compose up -d
#   docker compose logs -f
#
# === VRAM 예측 (24 GB GPU, 1.5B Full FT, μ/PRM은 remote) — 현재 default ===
#   π 1.5B base (bf16)              ~3.1 GB
#   gradients (bf16)                ~3.1 GB
#   8-bit Adam states               ~3.1 GB
#   activations (grad-ckpt, group=8) ~2–3 GB
#   vLLM colocate (gpu_mem=0.20)    ~4.8 GB
#   합계                              ~17 GB / 마진 ~7 GB ✅
#
# 7B QLoRA로 가려면 configs/policy.yaml에서:
#   model_id: Qwen/Qwen2.5-Math-7B-Instruct, quantization: 4bit, full_ft: false
#   rl_q3.yaml: learning_rate 5e-6 (LoRA 스케일), vllm.colocate: false

services:
  trainer:
    build: .
    image: pav-rl:latest
    container_name: pav-trainer
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      HF_HOME: /cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      # tqdm progress bar 실시간 표시 — docker logs가 pipe라 block-buffered 기본값 회피
      PYTHONUNBUFFERED: "1"
      # PyTorch CUDA allocator — expandable_segments로 fragmentation 완화 (24GB 빡빡한 환경 필수)
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      # 분산: 추론 PC의 PRM / μ 엔드포인트 (yaml의 remote.endpoint 값을 override)
      PRM_ENDPOINT: ${PRM_ENDPOINT:-http://localhost:8002}
      MU_ENDPOINT: ${MU_ENDPOINT:-http://localhost:8001}
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
    command: >
      python scripts/03_grpo_train.py
      --rl-config configs/rl_q3.yaml
      --prm-config configs/prm.yaml
      --policy-config configs/policy.yaml
    shm_size: "8g"
    # 추론 PC와 같은 LAN이면 host network로 두면 endpoint 설정이 단순해짐 (선택).
    # network_mode: host

  # ---------------------------- Streamlit Dashboard (port 8501) ----------------------------
  # 학습 metrics 실시간 시각화. 학습과 독립 — trainer 죽어도 dashboard 살아있음.
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: pav-dashboard:latest
    container_name: pav-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./scripts:/app/scripts:ro
      - ./outputs:/app/outputs:ro
