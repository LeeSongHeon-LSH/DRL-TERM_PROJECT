# н•ҷмҠө PC (3090 24 GB) вҖ” ПҖ trainer 1к°ң м»Ён…Ңмқҙл„Ҳ.
# PRM / ОјлҠ” м¶”лЎ  PCм—җм„ң лі„лҸ„ docker-compose.inference.ymlлЎң лқ„мӣҖ.
#
# === мӮ¬мҡ© ===
#   cp .env.example .env
#   # .envм—җм„ң PRM_ENDPOINT / MU_ENDPOINTлҘј м¶”лЎ  PC IPлЎң м„Өм •
#   docker compose build
#   docker compose up -d
#   docker compose logs -f
#
# === VRAM мҳҲмёЎ (24 GB GPU, 1.5B Full FT, Ој/PRMмқҖ remote) вҖ” нҳ„мһ¬ default ===
#   ПҖ 1.5B base (bf16)              ~3.1 GB
#   gradients (bf16)                ~3.1 GB
#   8-bit Adam states               ~3.1 GB
#   activations (grad-ckpt, group=8) ~2вҖ“3 GB
#   vLLM colocate (gpu_mem=0.20)    ~4.8 GB
#   н•©кі„                              ~17 GB / л§Ҳм§„ ~7 GB вң…
#
# 7B QLoRAлЎң к°Җл Өл©ҙ configs/policy.yamlм—җм„ң:
#   model_id: Qwen/Qwen2.5-Math-7B-Instruct, quantization: 4bit, full_ft: false
#   rl_q3.yaml: learning_rate 5e-6 (LoRA мҠӨмјҖмқј), vllm.colocate: false

services:
  # ---------------------------- ZTNCUI вҖ” мһҗмІҙ нҳёмҠӨнҢ… ZeroTier Controller + мӣ№ UI ----------------------------
  # my.zerotier.com м•Ҳ м“°кі  мһҗмІҙ controller мҡҙмҳҒ. http://localhost:3443м—җм„ң web UI.
  # 1. мІ« мӢңмһ‘ нӣ„ https://localhost:3443 м ‘мҶҚ вҶ’ default password ліҖкІҪ
  # 2. "Networks" вҶ’ "Add Network" вҶ’ 16мһҗлҰ¬ network ID мһҗлҸҷ л°ңкёү
  # 3. к·ё IDлҘј .envмқҳ ZT_NETWORK_IDм—җ мһ…л Ҙ вҶ’ docker compose restart zerotier
  # 4. 5070 м¶”лЎ  PCл“Өмқҙ joinн•ҳл©ҙ ZTNCUI Members нғӯм—җм„ң мҠ№мқё
  ztncui:
    image: keynetworks/ztncui:latest
    container_name: pav-ztncui
    restart: unless-stopped
    cap_add: [NET_ADMIN, SYS_ADMIN]
    devices:
      - /dev/net/tun
    volumes:
      - ./ztncui/etc:/opt/key-networks/ztncui/etc
      - ./ztncui/ztone:/var/lib/zerotier-one
    ports:
      - "3000:3000"           # мӣ№ UI HTTP (лёҢлқјмҡ°м Җ м ‘мҶҚ вҶ’ http://localhost:3000)
      - "9993:9993/udp"       # ZeroTier protocol (лӢӨлҘё л…ёл“ңл“Өмқҙ controller м°ҫкё°)
    environment:
      - NODE_ENV=production
      - HTTP_ALL_INTERFACES=yes
      - ZTNCUI_PASSWD=${ZTNCUI_PASSWD:-changeme}

  # ---------------------------- ZeroTier client (н•ҷмҠө PC ліёмқё) ----------------------------
  # мһҗмІҙ controller (ztncui)к°Җ мғқм„ұн•ң networkм—җ join.
  # trainer/nginx-lbк°Җ мқҙ м»Ён…Ңмқҙл„Ҳмқҳ network namespaceлҘј кіөмң  вҶ’ к°ҖмғҒ IPлЎң cluster нҳём¶ң.
  zerotier:
    image: zerotier/zerotier:latest
    container_name: pav-zerotier
    cap_add: [NET_ADMIN, SYS_ADMIN]
    devices:
      - /dev/net/tun
    volumes:
      - ./zerotier:/var/lib/zerotier-one
    # ZT_NETWORK_IDлҠ” ZTNCUI мӣ№UIм—җм„ң Network мғқм„ұ нӣ„ .envм—җ мһ…л Ҙ. л№Ҳ к°’мқҙл©ҙ м»Ён…Ңмқҙл„Ҳ idle (мқҳлҸ„лҗң stop).
    command: ${ZT_NETWORK_ID:-}
    depends_on: [ztncui]
    restart: unless-stopped

  # ---------------------------- nginx Load Balancer ----------------------------
  # Ој/PRM cluster л¶„мӮ° (least_conn + health check + auto fail-over).
  # ZeroTier network namespace кіөмң  вҶ’ 5070 clusterмқҳ к°ҖмғҒ IPлЎң upstream.
  nginx-lb:
    image: nginx:alpine
    container_name: pav-nginx-lb
    network_mode: "service:zerotier"
    depends_on: [zerotier]
    volumes:
      - ./nginx/inference-cluster.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  trainer:
    build: .
    image: pav-rl:latest
    container_name: pav-trainer
    network_mode: "service:zerotier"   # ZeroTier network кіөмң  вҶ’ nginx-lbлҘј localhostлЎң нҳём¶ң
    depends_on: [zerotier, nginx-lb]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      HF_HOME: /cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      # nginx-lbк°Җ к°ҷмқҖ network namespace вҶ’ localhostлЎң нҳём¶ң. nginxк°Җ ZeroTier clusterлЎң л¶„мӮ°.
      PRM_ENDPOINT: http://localhost:18002
      MU_ENDPOINT: http://localhost:18001
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
    command: >
      python scripts/03_grpo_train.py
      --rl-config configs/rl_q3.yaml
      --prm-config configs/prm.yaml
      --policy-config configs/policy.yaml
    shm_size: "8g"

  # ---------------------------- Streamlit Dashboard (port 8501) ----------------------------
  # н•ҷмҠө metrics мӢӨмӢңк°„ мӢңк°Ғнҷ”. н•ҷмҠөкіј лҸ…лҰҪ вҖ” trainer мЈҪм–ҙлҸ„ dashboard мӮҙм•„мһҲмқҢ.
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: pav-dashboard:latest
    container_name: pav-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./scripts:/app/scripts:ro
      - ./outputs:/app/outputs:ro
