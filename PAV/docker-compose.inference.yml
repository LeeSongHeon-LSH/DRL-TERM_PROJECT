# 추론 PC (3090 Ti / 5070 등) — μ vLLM + PRM HTTP + FRP client (학습 PC 로 outbound tunnel)
#
# === 사용 ===
#   cp .env.example .env
#   FRPS_ADDR=<학습PC 공인IP/DDNS> FRPS_TOKEN=<frps 와 동일 토큰> NODE_NAME=<유일라벨> \
#     docker compose -f docker-compose.inference.yml up -d --build
#
# === NAT 친화 ===
#   - 추론 PC 는 outbound TCP 만 (학습 PC :7000). 추론 PC NAT/CGNAT 무관.
#   - ZeroTier / MOON / NAT punching 모두 불필요. FRP single persistent TCP.
#
# === Cluster ===
#   여러 추론 PC 띄울 때 — NODE_NAME 만 다르게 (예: NODE_NAME=5070-pc-01, 02, ...).
#   frps 가 같은 group ("mu_cluster", "prm_cluster") 으로 자동 round-robin + health check.
#
# === 노출 포트 (이 컨테이너 내부, frpc 가 tunnel 로 학습 PC 로 노출) ===
#   8001 — μ vLLM OpenAI API   (Qwen/Qwen2.5-Math-1.5B-Instruct frozen base)
#   8002 — PRM FastAPI         (Skywork/Skywork-o1-Open-PRM-Qwen-2.5-1.5B int8)
#
# === VRAM 예측 (24 GB GPU, 1.5B μ + PRM 1.5B int8, K=16 batch) ===
#   μ vLLM       ~17 GB  (gpu-memory-utilization 0.85)
#   PRM int8     ~4  GB
#   합계         ~21 GB / 마진 ~3 GB
#
# 7B μ로 확장 시: MU_MODEL_ID=Qwen/Qwen2.5-Math-7B-Instruct, MU_GPU_MEM=0.65

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  # ---------------------------- FRP Client (학습 PC 로 outbound tunnel) ----------------------------
  # 학습 PC frps 에 outbound TCP 1개 — mu/PRM 을 학습 PC localhost:18001/18002 에 노출.
  # 추론 PC NAT 뒤든 CGNAT 뒤든 무관 — outbound 만 함.
  frpc:
    image: fatedier/frpc:v0.61.0
    container_name: pav-frpc
    restart: unless-stopped
    depends_on: [mu-server, prm-server]
    volumes:
      - ./frp/frpc.toml:/etc/frp/frpc.toml:ro
    environment:
      FRPS_ADDR: "${FRPS_ADDR:-}"
      FRPS_TOKEN: "${FRPS_TOKEN:-}"
      NODE_NAME: "${NODE_NAME:-}"
    command: ["-c", "/etc/frp/frpc.toml"]

  # ---------------------------- μ — vLLM OpenAI API (port 8001) ----------------------------
  mu-server:
    build: .
    image: pav-rl:latest
    container_name: pav-mu-server
    restart: unless-stopped
    <<: *gpu
    environment:
      HF_HOME: /cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model ${MU_MODEL_ID:-Qwen/Qwen2.5-Math-1.5B-Instruct}
      --port 8001
      --host 0.0.0.0
      --gpu-memory-utilization ${MU_GPU_MEM:-0.85}
      --max-model-len ${MU_MAX_LEN:-1536}
      --max-num-seqs ${MU_MAX_NUM_SEQS:-32}
      --dtype bfloat16
      --enable-prefix-caching
      --enforce-eager
    shm_size: "4g"

  # ---------------------------- PRM — FastAPI (port 8002) ----------------------------
  prm-server:
    build: .
    image: pav-rl:latest
    container_name: pav-prm-server
    restart: unless-stopped
    <<: *gpu
    environment:
      HF_HOME: /cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      PRM_CONFIG: /app/configs/prm.yaml
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
      - ./configs:/app/configs:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
      - ../FRP/scripts:/app/frp-scripts:ro
    command: >
      python /app/frp-scripts/serve_prm_http.py
      --config /app/configs/prm.yaml
      --host 0.0.0.0
      --port 8002
