# 추론 PC (3090 Ti 24 GB) — μ vLLM server + PRM HTTP server
#
# === 사용 ===
#   cp .env.inference.example .env
#   docker compose -f docker-compose.inference.yml build
#   docker compose -f docker-compose.inference.yml up -d
#   docker compose -f docker-compose.inference.yml logs -f
#
# === 노출 포트 ===
#   8001 — μ vLLM OpenAI API   (Qwen/Qwen2.5-Math-7B-Instruct frozen base)
#   8002 — PRM FastAPI         (Skywork/Skywork-o1-Open-PRM-Qwen-2.5-1.5B int8)
#
# === VRAM 예측 (24 GB GPU, 1.5B μ + PRM 1.5B int8 기준, Phase 1 K=16 batch) ===
#   μ vLLM       ~17 GB  (gpu-memory-utilization 0.7, 1.5B bf16 + KV cache 14.4 GB)
#   PRM int8     ~4  GB  (bnb 8bit)
#   합계         ~21 GB  / 마진 ~3 GB
#
# === vLLM 안정성 옵션 (Phase 1 K=16 stress 회피) ===
#   --max-model-len 2048    : sequence당 KV cache 절반 (4096→2048)
#   --max-num-seqs 64       : concurrent seq 제한, queue로 안정
#   --enforce-eager         : CUDA graph off, fragmentation 누적 회피
#
# 7B μ로 확장 시: MU_MODEL_ID=Qwen/Qwen2.5-Math-7B-Instruct, MU_GPU_MEM=0.65
#   → μ 15.6 GB + PRM 4 GB = 19.6 GB / 마진 4.4 GB
#
# === 학습 PC가 호출하는 endpoint ===
#   PRM_ENDPOINT=http://<이 PC IP>:8002
#   MU_ENDPOINT =http://<이 PC IP>:8001

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  # ---------------------------- ZeroTier sidecar (mesh VPN) ----------------------------
  # 학습 PC ↔ 이 추론 PC를 공인 IP 없이 연결.
  # mu-server / prm-server가 이 컨테이너의 network namespace를 공유.
  zerotier:
    image: zerotier/zerotier:latest
    container_name: pav-zerotier
    cap_add: [NET_ADMIN, SYS_ADMIN]
    devices:
      - /dev/net/tun
    volumes:
      - ./zerotier:/var/lib/zerotier-one
      - ./scripts/zt-entrypoint.sh:/zt-entrypoint.sh:ro
    entrypoint: ["/zt-entrypoint.sh"]
    command: ${ZT_NETWORK_ID:-}
    environment:
      MOON_IP: ${MOON_IP:-}      # set → orbit MOON on startup (derives MOON_ID from network_id)
    restart: unless-stopped

  # ---------------------------- μ — vLLM OpenAI API (port 8001 on ZeroTier) ----------------------------
  # 같은 ZeroTier 가상 LAN의 학습 PC가 이 노드의 가상 IP:8001로 호출.
  # role=mu 또는 role=prm 중 하나만 띄움 — `docker compose up mu-server` (또는 prm-server)
  mu-server:
    build: .
    image: pav-rl:latest
    container_name: pav-mu-server
    restart: unless-stopped
    network_mode: "service:zerotier"
    depends_on: [zerotier]
    <<: *gpu
    environment:
      HF_HOME: /cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model ${MU_MODEL_ID:-Qwen/Qwen2.5-Math-1.5B-Instruct}
      --port 8001
      --host 0.0.0.0
      --gpu-memory-utilization ${MU_GPU_MEM:-0.85}
      --max-model-len ${MU_MAX_LEN:-1536}
      --max-num-seqs ${MU_MAX_NUM_SEQS:-32}
      --dtype bfloat16
      --enable-prefix-caching
      --enforce-eager
    shm_size: "4g"

  # ---------------------------- PRM — FastAPI (port 8002 on ZeroTier) ----------------------------
  prm-server:
    build: .
    image: pav-rl:latest
    container_name: pav-prm-server
    restart: unless-stopped
    network_mode: "service:zerotier"
    depends_on: [zerotier]
    <<: *gpu
    environment:
      HF_HOME: /cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      PRM_CONFIG: /app/configs/prm.yaml
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
      - ./configs:/app/configs:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
    command: >
      python scripts/serve_prm_http.py
      --config /app/configs/prm.yaml
      --host 0.0.0.0
      --port 8002
