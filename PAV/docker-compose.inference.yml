# м¶”лЎ  PC (3090 Ti 24 GB) вҖ” Ој vLLM server + PRM HTTP server
#
# === мӮ¬мҡ© ===
#   cp .env.inference.example .env
#   docker compose -f docker-compose.inference.yml build
#   docker compose -f docker-compose.inference.yml up -d
#   docker compose -f docker-compose.inference.yml logs -f
#
# === л…ём¶ң нҸ¬нҠё ===
#   8001 вҖ” Ој vLLM OpenAI API   (Qwen/Qwen2.5-Math-7B-Instruct frozen base)
#   8002 вҖ” PRM FastAPI         (Skywork/Skywork-o1-Open-PRM-Qwen-2.5-1.5B int8)
#
# === VRAM мҳҲмёЎ (24 GB GPU, 1.5B Ој + PRM 1.5B int8 кё°мӨҖ, Phase 1 K=16 batch) ===
#   Ој vLLM       ~17 GB  (gpu-memory-utilization 0.7, 1.5B bf16 + KV cache 14.4 GB)
#   PRM int8     ~4  GB  (bnb 8bit)
#   н•©кі„         ~21 GB  / л§Ҳм§„ ~3 GB
#
# === vLLM м•Ҳм •м„ұ мҳөм…ҳ (Phase 1 K=16 stress нҡҢн”ј) ===
#   --max-model-len 2048    : sequenceлӢ№ KV cache м Ҳл°ҳ (4096вҶ’2048)
#   --max-num-seqs 64       : concurrent seq м ңн•ң, queueлЎң м•Ҳм •
#   --enforce-eager         : CUDA graph off, fragmentation лҲ„м Ғ нҡҢн”ј
#
# 7B ОјлЎң нҷ•мһҘ мӢң: MU_MODEL_ID=Qwen/Qwen2.5-Math-7B-Instruct, MU_GPU_MEM=0.65
#   вҶ’ Ој 15.6 GB + PRM 4 GB = 19.6 GB / л§Ҳм§„ 4.4 GB
#
# === н•ҷмҠө PCк°Җ нҳём¶ңн•ҳлҠ” endpoint ===
#   PRM_ENDPOINT=http://<мқҙ PC IP>:8002
#   MU_ENDPOINT =http://<мқҙ PC IP>:8001

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  # ---------------------------- ZeroTier sidecar (mesh VPN) ----------------------------
  # н•ҷмҠө PC вҶ” мқҙ м¶”лЎ  PCлҘј кіөмқё IP м—Ҷмқҙ м—°кІ°.
  # mu-server / prm-serverк°Җ мқҙ м»Ён…Ңмқҙл„Ҳмқҳ network namespaceлҘј кіөмң .
  zerotier:
    image: zerotier/zerotier:latest
    container_name: pav-zerotier
    cap_add: [NET_ADMIN, SYS_ADMIN]
    devices:
      - /dev/net/tun
    volumes:
      - ./zerotier:/var/lib/zerotier-one
      - ./scripts/zt-entrypoint.sh:/zt-entrypoint.sh:ro
    entrypoint: ["sh", "/zt-entrypoint.sh"]   # sh м§Ғм ‘ нҳём¶ң вҖ” нҳёмҠӨнҠё нҢҢмқј execute bit мқҳмЎҙм„ұ м ңкұ°
    command: ${ZT_NETWORK_ID:-}
    environment:
      MOON_IP: ${MOON_IP:-}      # set вҶ’ orbit MOON on startup (derives MOON_ID from network_id)
    restart: unless-stopped

  # ---------------------------- Ој вҖ” vLLM OpenAI API (port 8001 on ZeroTier) ----------------------------
  # к°ҷмқҖ ZeroTier к°ҖмғҒ LANмқҳ н•ҷмҠө PCк°Җ мқҙ л…ёл“ңмқҳ к°ҖмғҒ IP:8001лЎң нҳём¶ң.
  # role=mu лҳҗлҠ” role=prm мӨ‘ н•ҳлӮҳл§Ң лқ„мӣҖ вҖ” `docker compose up mu-server` (лҳҗлҠ” prm-server)
  mu-server:
    build: .
    image: pav-rl:latest
    container_name: pav-mu-server
    restart: unless-stopped
    network_mode: "service:zerotier"
    depends_on: [zerotier]
    <<: *gpu
    environment:
      HF_HOME: /cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model ${MU_MODEL_ID:-Qwen/Qwen2.5-Math-1.5B-Instruct}
      --port 8001
      --host 0.0.0.0
      --gpu-memory-utilization ${MU_GPU_MEM:-0.85}
      --max-model-len ${MU_MAX_LEN:-1536}
      --max-num-seqs ${MU_MAX_NUM_SEQS:-32}
      --dtype bfloat16
      --enable-prefix-caching
      --enforce-eager
    shm_size: "4g"

  # ---------------------------- PRM вҖ” FastAPI (port 8002 on ZeroTier) ----------------------------
  prm-server:
    build: .
    image: pav-rl:latest
    container_name: pav-prm-server
    restart: unless-stopped
    network_mode: "service:zerotier"
    depends_on: [zerotier]
    <<: *gpu
    environment:
      HF_HOME: /cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      PRM_CONFIG: /app/configs/prm.yaml
    volumes:
      - ${HF_HOME_HOST:-./.hf_cache}:/cache/huggingface
      - ./configs:/app/configs:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
    command: >
      python scripts/serve_prm_http.py
      --config /app/configs/prm.yaml
      --host 0.0.0.0
      --port 8002
