# 메인 RL 조건 — Q3 (risk-seeking, mean − λ·std, λ=−0.5)
# Phase 1 MCRolloutPAV(K=16) + GRPO + LoRA
algorithm: grpo

defaults:
  prm: prm.yaml
  policy: policy.yaml

# PAV 추출 — DifferentialPAV ↔ MCRolloutPAV swap은 method 키만 변경
pav:
  method: mc_rollout        # Phase 1 — μ로 K개 alternative rollout, counterfactual advantage
  K: 16                     # MC rollout 수 (mc_rollout 전용)

# Reward 가공
reward:
  alpha: 3.0                # PAV 가중치 (ablation: 1.5 ~ 5.5)
  mode: Q3                  # B1 | Q1 | Q3 | Q4
  lam: -0.5                 # Q3 risk-seeking
  cvar_alpha: 0.2           # Q4 CVaR tail

# GRPO
grpo:
  group_size: 8             # 같은 문제에서 8 rollout — advantage 추정 품질 ↑, GRPO 권장 최소값
  kl_beta: 0.04             # anti-hacking (DeepSeekMath/GRPO 원논문 기준)
  clip_eps: 0.2
  learning_rate: 2.0e-6     # 1.5B Full FT 기준 — 5e-7은 너무 보수적, 2e-6으로 상향
  total_steps: 5000            # 본격 학습. step time 50s × 5000 = ~70시간
  warmup_steps: 50             # 5000 step의 1% (smoke는 5)
  gradient_accumulation: 8     # batch_size=1 대비 높게 — VRAM 절약
  # optimizer 선택.
  # adamw_bnb_8bit: bitsandbytes 8-bit AdamW — 메모리 절반 (VRAM 한계 시 기본)
  # paged_adamw_8bit: 8-bit + CPU offloading — OOM 방지
  # galore_adamw_8bit_layerwise: gradient low-rank projection + 8bit + layer 단위 → peak 매우 작음. 1.5B Full FT 24GB 최적.
  # LoRA / 4bit QLoRA에서는 "adamw_torch" (default) 또는 "paged_adamw_8bit" 둘 다 OK.
  optim: adamw_bnb_8bit

# 데이터
# 학습 = GSM8K (단일), 검증/최종평가 = MathNet (Olympiad-level, English text-only)
data:
  train:
    - dataset: gsm8k
      split: train
  eval:
    - dataset: mathnet
      split: train          # MathNet은 train split만 존재 (test/val 없음)
      filters:
        language: English
        text_only: true       # images 가 없는 문제만
        require_final_answer: true   # final_answer not null
      subset: 200             # 처음 200문제만 (필터 후)

# vLLM rollout (학습 정책 π의 colocate rollout)
# 1.5B Full FT + 분산(μ/PRM remote) 기준:
#   colocate: true + gpu_memory_utilization: 0.20 → π vLLM 4.8 GB, trainer 13 GB, 합 ~18 GB ✅
# 7B로 확장 시 colocate vLLM의 15GB duplicate를 감당 못 함 → colocate: false 강제.
# 80GB GPU면 colocate: true + gpu_memory_utilization: 0.35 권장.
vllm:
  enable_prefix_caching: true
  colocate: true                 # GaLore/CAME 메모리 절감으로 vLLM 자리 확보
  gpu_memory_utilization: 0.30   # PRM remote 복귀 → vLLM 7.2GB 복원
  max_new_tokens: 256            # 학습용 forward seq (GSM8K solution은 보통 200-300 tokens)

# 로깅
logging:
  wandb_project:               # 빈 값 → wandb 비활성, stdout만
  wandb_run_name: PAV-distribution-fewshot-nomal-test
  log_every: 1                # 매 step metrics 기록 (dashboard/jsonl 세밀하게)
  eval_every: 100             # 500→100: CUDA unknown error로 step 224에서 죽었던 사례 — 더 자주 체크포인트 저장 (resume 가능)
  dump_samples_every: 10    # trivial-step 함정 모니터링 — 10 step마다 samples.jsonl 기록
