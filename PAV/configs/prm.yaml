# Skywork-o1-Open-PRM-Qwen-2.5-1.5B (천공 PRM, 경량 default)
# step-level PRM, Qwen2.5 family. fp16 기본 (~2.9GB → int8로 ~1.7GB).
# 7B 변형: Skywork/Skywork-o1-Open-PRM-Qwen-2.5-7B (~14GB).
name: skywork-o1-prm
model_id: Skywork/Skywork-o1-Open-PRM-Qwen-2.5-1.5B

# 양자화 / 추론
quantization: 8bit           # "none" | "8bit" (bitsandbytes LLM.int8) | "awq"
dtype: float16
device: cuda
max_model_len: 4096

# step 경계 — Skywork PRM은 단일 newline (\n)
step_token: "\n"
batch_size: 16

# ---- 분산 모드
# mode: "local"   → 같은 GPU에 PRM 가중치 로드 (PRM 클래스)
# mode: "remote"  → HTTP로 PRM 서버 호출 (RemotePRM 클래스)
#                   서버: scripts/serve_prm_http.py (FastAPI + uvicorn)
#                   환경변수 PRM_ENDPOINT로 endpoint override 가능
mode: remote
remote:
  endpoint: http://localhost:8002
  timeout: 300              # K=16 score_batch 안정성 (120→300)
  batch_size: 16            # 32→16: 추론 PC GPU 부하 (μ 14.4GB + PRM batch) → OOM 회피
