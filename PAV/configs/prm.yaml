# Skywork-o1-Open-PRM-Qwen-2.5-1.5B (천공 PRM, 경량 default)
# step-level PRM, Qwen2.5 family. fp16 기본 (~2.9GB).
# 7B 변형: Skywork/Skywork-o1-Open-PRM-Qwen-2.5-7B (~14GB).
name: skywork-o1-prm
model_id: Skywork/Skywork-o1-Open-PRM-Qwen-2.5-1.5B

# 양자화 / 추론
quantization: none           # "none" | "awq"
dtype: float16
device: cuda
max_model_len: 4096

# step 경계 — Skywork PRM은 단일 newline (\n)
step_token: "\n"
batch_size: 16

# ---- 분산 모드 (Ray cluster RPC)
# mode: "local" → 같은 GPU에 PRM 가중치 로드 (PRM 인스턴스)
# mode: "ray"   → Ray cluster의 named actor(들)에 RPC
#                 - num_replicas: 1 → RayPRMClient (단일 actor)
#                 - num_replicas: 2+ → RayPRMClientPool (라운드로빈 + score_batch N-way 분산)
#                 예: 5070 GPU 5대 분산 → num_replicas: 5
mode: local
ray_address: auto                          # "auto" = head 자동 감지 / 명시: ray://head:10001
namespace: pav-rl
actor_name: prm-actor                      # named actor — replicas≥2면 prm-actor-0, -1, ...
num_replicas: 1
rpc_timeout: 120
